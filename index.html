<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rounded WebView Blur</title>
  <style>
    /* Ensure the HTML/Body canvas is completely transparent and fills the viewport */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: transparent;
      overflow: hidden;
      box-sizing: border-box;
    }

    /* Container creates spacing from the edge so the rounded corners are visible */
    body {
      padding: 16px; /* Adjust this value to change distance from screen edges */
    }

    /* The rounded, blurred element */
    .blur-overlay {
      width: 100%;
      height: 100%;

      /* Border radius for rounded corners */
      border-radius: 24px; /* Adjust rounding amount here */

      /* Semi-transparent background tint */
      background: rgba(255, 255, 255, 0.2); 

      /* Backdrop blur filters */
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);

      /* Optional: subtle border to define the rounded edge nicely */
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>

  <div class="blur-overlay"></div>

</body>
</html>
