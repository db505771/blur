<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clean Rounded Liquid Blur</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    .clean-rounded-blur {
      width: 100%;
      height: 100%;
      box-sizing: border-box;

      /* Smooth rounded corners */
      border-radius: 24px; 
      
      /* Clips the blur and tint cleanly inside the curve */
      overflow: hidden;

      /* Apple Liquid Glass tint (no outlines or borders) */
      background: linear-gradient(
        180deg, 
        rgba(255, 255, 255, 0.08) 0%, 
        rgba(0, 0, 0, 0.25) 100%
      );

      /* High blur + Saturation boost */
      backdrop-filter: blur(35px) saturate(180%);
      -webkit-backdrop-filter: blur(35px) saturate(180%);

      /* NO borders or box shadows = No visible corner lines! */
      border: none;
      box-shadow: none;
    }
  </style>
</head>
<body>

  <div class="clean-rounded-blur"></div>

</body>
</html>
