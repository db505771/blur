<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pure Liquid Glass</title>
  <style>
    html, body {
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
      height: 100% !important;
      background: transparent !important;
      overflow: hidden;
    }

    .liquid-glass-pure {
      width: 100%;
      height: 100%;
      box-sizing: border-box;

      appearance: none;
      -webkit-appearance: none;
      outline: none;
      padding: 0;
      margin: 0;
      display: block;
      cursor: pointer;

      /* Smooth rounded corners */
      border-radius: 28px;
      overflow: hidden;

      /* FIX FOR DARK CORNER EDGES: Clips the WebView rendering cleanly inside the radius */
      -webkit-mask-image: -webkit-radial-gradient(white, black);

      /* LIQUID GLASS SURFACE: Pure light sheen, no dark/black tint layer */
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.28) 0%,
        rgba(255, 255, 255, 0.08) 45%,
        rgba(255, 255, 255, 0.15) 100%
      );

      /* Native Backdrop Blur + High Saturation */
      backdrop-filter: blur(25px) saturate(210%);
      -webkit-backdrop-filter: blur(25px) saturate(210%);

      /* NO borders or strokes that create dark outlines */
      border: none;

      /* Soft specular edge highlights (white glow instead of dark shadows) */
      box-shadow: 
        inset 0 1.5px 2px 0 rgba(255, 255, 255, 0.5),
        inset 0 -1px 2px 0 rgba(255, 255, 255, 0.2),
        0 8px 24px rgba(0, 0, 0, 0.12);

      /* Touch Feedback */
      transition: transform 0.15s ease, background 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .liquid-glass-pure:active {
      transform: scale(0.98);
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.38) 0%,
        rgba(255, 255, 255, 0.18) 100%
      );
    }
  </style>
</head>
<body>

  <button class="liquid-glass-pure" type="button"></button>

</body>
</html>
