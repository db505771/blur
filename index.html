<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blur Effect Demo</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff7e5f, #feb47b);
      font-family: Arial, sans-serif;
    }

    /* Method 1: Frosted Glass / Backdrop Blur Card */
    .glass-card {
      padding: 30px 40px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px); /* For Safari support */
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      color: white;
      text-align: center;
    }

    /* Method 2: Fully Blurred Element */
    .blurred-text {
      font-size: 1.2rem;
      filter: blur(4px);
    }
  </style>
</head>
<body>

  <div class="glass-card">
    <h2>Frosted Glass Card</h2>
    <p>This box blurs the colorful background behind it.</p>
    <p class="blurred-text">This text itself is blurred!</p>
  </div>

</body>
</html>
