<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebView Blur Overlay</title>
  <style>
    /* Make the page background transparent */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: transparent;
      overflow: hidden;
    }

    /* Fullscreen overlay that blurs everything underneath */
    .blur-overlay {
      width: 100%;
      height: 100%;

      /* Semi-transparent tint to make the blur effect visible */
      background: rgba(255, 255, 255, 0.15); 

      /* Blur filter applied to the underlying WebView content */
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
    }
  </style>
</head>
<body>

  <div class="blur-overlay"></div>

</body>
</html>
