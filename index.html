<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semi-Transparent Blue Blur Box</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      /* Background pattern so you can see the blur & transparency in action */
      background: linear-gradient(135deg, #1e1e24, #3a3a40);
    }

    .blue-blur-box {
      width: 300px;
      height: 200px;
      border-radius: 16px;
      
      /* Semi-transparent blue color (RGBA: Red, Green, Blue, Alpha/Opacity) */
      background-color: rgba(0, 122, 255, 0.25); 
      
      /* Blur effect behind the element */
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px); /* Safari support */

      /* Subtle border to give it a clean edge */
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
  </style>
</head>
<body>

  <div class="blue-blur-box"></div>

</body>
</html>
