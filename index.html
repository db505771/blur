<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Floating Dark Blur Card</title>
  <style>
    /* Fill viewport while keeping canvas completely clear */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: transparent;
      overflow: hidden;
      box-sizing: border-box;
    }

    /* Padding around body creates room for rounded corners to stand out */
    body {
      padding: 12px; 
      display: flex;
    }

    /* Floating Dark Glass Card */
    .blur-card {
      width: 100%;
      height: 100%;

      /* Rounding the corners */
      border-radius: 24px;

      /* CLIPS the blur filter to the rounded corners! */
      overflow: hidden;

      /* Dark mode semi-transparent background */
      background: rgba(0, 0, 0, 0.45);

      /* Backdrop blur filters */
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);

      /* Subtle highlight border to make edges pop */
      border: 1px solid rgba(255, 255, 255, 0.12);

      /* Subtle shadow underneath */
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>

  <div class="blur-card"></div>

</body>
</html>
