<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seamless Liquid Blur</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    .pure-liquid-blur {
      width: 100%;
      height: 100%;
      box-sizing: border-box;

      /* Flat edges, no rounded corners */
      border-radius: 0; 

      /* Soft specular tint without hard edges */
      background: linear-gradient(
        180deg, 
        rgba(255, 255, 255, 0.08) 0%, 
        rgba(0, 0, 0, 0.2) 100%
      );

      /* High blur + Saturation boost */
      backdrop-filter: blur(35px) saturate(180%);
      -webkit-backdrop-filter: blur(35px) saturate(180%);

      /* NO borders or shadows -> eliminates the box frame completely */
      border: none;
      box-shadow: none;
    }
  </style>
</head>
<body>

  <div class="pure-liquid-blur"></div>

</body>
</html>
