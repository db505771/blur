<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Liquid Glass Rounded</title>
  <style>
    html, body {
      margin: 0 !important;
      padding: 0 !important;
      width: 100% !important;
      height: 100% !important;
      background: transparent !important;
      overflow: hidden;
    }

    .liquid-glass-rounded {
      width: 100%;
      height: 100%;
      box-sizing: border-box;

      appearance: none;
      -webkit-appearance: none;
      outline: none;
      padding: 0;
      margin: 0;
      display: block;
      cursor: pointer;

      /* FIXED RADIUS: Keeps normal rounded corners instead of forming an oval */
      border-radius: 28px;
      overflow: hidden;

      /* Pure Liquid Glass Sheen (No hard inner borders or edge lines) */
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.16) 0%,
        rgba(255, 255, 255, 0.04) 50%,
        rgba(0, 0, 0, 0.12) 100%
      );

      /* Liquid Glass Backdrop Blur & Saturation */
      backdrop-filter: blur(30px) saturate(200%);
      -webkit-backdrop-filter: blur(30px) saturate(200%);

      /* NO BORDER - Completely removes visible outline edges */
      border: none;

      /* Subtle ambient drop shadow for depth without hard edge strokes */
      box-shadow: 
        inset 0 1px 1px 0 rgba(255, 255, 255, 0.3),
        0 8px 24px rgba(0, 0, 0, 0.15);

      /* Touch Feedback */
      transition: transform 0.15s ease, background 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .liquid-glass-rounded:active {
      transform: scale(0.98);
      background: linear-gradient(
        135deg,
        rgba(255, 255, 255, 0.22) 0%,
        rgba(0, 0, 0, 0.2) 100%
      );
    }
  </style>
</head>
<body>

  <button class="liquid-glass-rounded" type="button"></button>

</body>
</html>
