<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apple Liquid Glass Overlay</title>
  <style>
    /* Ensure page is transparent for WebView */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    /* Apple-style Liquid Glass Container */
    .liquid-glass {
      width: 100%;
      height: 100%;
      box-sizing: border-box;

      /* Smooth iOS squircle-style corner rounding */
      border-radius: 28px;

      /* Multi-layer liquid glass appearance:
         1. Light specular gradient across the glass surface
         2. Soft dark translucent base */
      background: 
        linear-gradient(
          135deg, 
          rgba(255, 255, 255, 0.12) 0%, 
          rgba(255, 255, 255, 0.03) 40%, 
          rgba(0, 0, 0, 0.25) 100%
        );

      /* High blur + Saturation boost creates Apple's deep glass look */
      backdrop-filter: blur(35px) saturate(180%);
      -webkit-backdrop-filter: blur(35px) saturate(180%);

      /* Glass edge refraction highlights */
      border: 1px solid rgba(255, 255, 255, 0.18);

      /* Inner glass highlight rim & subtle outer glow */
      box-shadow: 
        inset 0 1px 1px 0 rgba(255, 255, 255, 0.35),
        inset 0 -1px 1px 0 rgba(0, 0, 0, 0.2),
        0 12px 32px rgba(0, 0, 0, 0.35);
    }
  </style>
</head>
<body>

  <div class="liquid-glass"></div>

</body>
</html>
