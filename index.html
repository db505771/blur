<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Bleed Liquid Glass</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    .liquid-glass-full {
      width: 100%;
      height: 100%;
      box-sizing: border-box;

      /* Flat edges so no corner gaps show through */
      border-radius: 0; 

      /* Apple Liquid Glass Surface Gradient */
      background: 
        linear-gradient(
          135deg, 
          rgba(255, 255, 255, 0.12) 0%, 
          rgba(255, 255, 255, 0.03) 40%, 
          rgba(0, 0, 0, 0.25) 100%
        );

      /* High blur + Saturation boost */
      backdrop-filter: blur(35px) saturate(180%);
      -webkit-backdrop-filter: blur(35px) saturate(180%);

      /* Subtile edge highlight rim */
      border: 1px solid rgba(255, 255, 255, 0.15);

      /* Inner specular highlight */
      box-shadow: 
        inset 0 1px 1px 0 rgba(255, 255, 255, 0.35),
        inset 0 -1px 1px 0 rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body>

  <div class="liquid-glass-full"></div>

</body>
</html>
