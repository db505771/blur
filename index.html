<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polished Glass</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
    }

    .polished-glass {
      width: 100%;
      height: 100%;
      box-sizing: border-box;

      /* Smooth rounded corners */
      border-radius: 28px; 
      overflow: hidden;

      /* Light translucent tint - lets background colors pop without turning muddy */
      background: rgba(255, 255, 255, 0.12);

      /* Strong blur + high saturation for rich color passthrough */
      backdrop-filter: blur(30px) saturate(210%);
      -webkit-backdrop-filter: blur(30px) saturate(210%);

      /* Soft shadow so the card floats cleanly above app content */
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
    }
  </style>
</head>
<body>

  <div class="polished-glass"></div>

</body>
</html>
