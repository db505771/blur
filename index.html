<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dark Mode Rounded Blur Overlay</title>
  <style>
    /* Ensure the body fills 100% of the viewport with no extra padding */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: transparent;
      overflow: hidden;
    }

    /* Fullscreen dark-mode blur container */
    .blur-overlay {
      width: 100%;
      height: 100%;
      box-sizing: border-box;

      /* Rounded corners directly on the full-size view */
      border-radius: 20px; 

      /* Dark mode semi-transparent tint */
      background: rgba(0, 0, 0, 0.4); 

      /* Backdrop blur filters */
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);

      /* Dark mode border highlight around the edges */
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>

  <div class="blur-overlay"></div>

</body>
</html>
